name: Deploy Setup Page

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - setup/**
      - .github/workflows/deploy-setup-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static setup page
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp setup/index.html _site/index.html
          touch _site/.nojekyll
          cat > _site/README.txt <<'EOF'
          Agent Compliance Community Setup
          This site is generated from setup/index.html.
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
